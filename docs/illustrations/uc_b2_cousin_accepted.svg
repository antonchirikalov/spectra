<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="grad-alison" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="grad-living" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="grad-cousin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="grad-cousin-child" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>

  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">B2. Кузина приняла приглашение</text>
  <text x="450" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Узел кузины теперь её. Она сама правит свои данные и добавляет свою линию.</text>

  <!-- Legend at top right -->
  <g transform="translate(620, 95)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#grad-alison)"/>
    <text x="28" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Алисон</text>
    <rect x="90" y="0" width="18" height="18" rx="4" fill="url(#grad-cousin)"/>
    <text x="118" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Кузина</text>
  </g>

  <!-- Connecting lines -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M450,160 L450,240"/>
    <path d="M450,300 L450,380"/>
    <path d="M300,380 L380,380"/>
    <path d="M520,380 L600,380"/>
    <path d="M600,380 L600,300 L680,300"/>
    <path d="M600,380 L600,460 L680,460"/>
    <!-- Cousin's additions -->
    <path d="M750,300 L820,300 L820,260"/>
    <path d="M820,300 L820,340"/>
    <path d="M750,460 L820,460 L820,420"/>
    <path d="M820,460 L820,500"/>
  </g>

  <!-- Grandmother -->
  <g transform="translate(375, 95)" filter="url(#shadow)">
    <rect width="150" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Бабушка</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Mother -->
  <g transform="translate(385, 240)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Мать</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Alison -->
  <g transform="translate(385, 415)" filter="url(#shadow)">
    <rect width="130" height="70" rx="16" fill="url(#grad-alison)"/>
    <circle cx="30" cy="24" r="11" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
    <text x="54" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Алисон</text>
    <text x="54" y="49" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ владелица</text>
  </g>

  <!-- Brother -->
  <g transform="translate(170, 450)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <rect x="18" y="12" width="20" height="20" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <text x="48" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Брат</text>
    <text x="48" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♂ жив</text>
  </g>

  <!-- Cousin - now owned -->
  <g transform="translate(680, 270)" filter="url(#shadow)">
    <rect width="150" height="75" rx="16" fill="url(#grad-cousin)"/>
    <circle cx="30" cy="26" r="11" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
    <text x="54" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Кузина</text>
    <text x="54" y="51" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ приняла ✅</text>
  </g>

  <!-- Cousin's child 1 -->
  <g transform="translate(770, 205)" filter="url(#shadow)">
    <rect width="120" height="55" rx="12" fill="url(#grad-cousin-child)"/>
    <rect x="16" y="10" width="16" height="16" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <text x="40" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="white">Сын</text>
    <text x="40" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f1f5f9">♂ добавлен</text>
  </g>

  <!-- Cousin's child 2 -->
  <g transform="translate(770, 325)" filter="url(#shadow)">
    <rect width="120" height="55" rx="12" fill="url(#grad-cousin-child)"/>
    <circle cx="24" cy="17" r="8" fill="none" stroke="white" stroke-width="2"/>
    <text x="42" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="white">Дочь</text>
    <text x="42" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f1f5f9">♀ добавлена</text>
  </g>

  <!-- Cousin's husband -->
  <g transform="translate(770, 445)" filter="url(#shadow)">
    <rect width="120" height="55" rx="12" fill="url(#grad-cousin-child)"/>
    <rect x="16" y="10" width="16" height="16" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <text x="40" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="white">Муж</text>
    <text x="40" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f1f5f9">♂ связь</text>
  </g>

  <!-- Annotation -->
  <g transform="translate(90, 300)">
    <path d="M0,15 L60,15" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-cousin)"/>
    <defs>
      <marker id="arrow-cousin" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
      </marker>
    </defs>
    <text x="70" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569">Своя ветка</text>
    <text x="70" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">без одобрения Алисон</text>
  </g>
</svg>