<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="grad-alison" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="grad-living" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="grad-deceased" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>

  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">A2. Умерший предок — структурный узел</text>
  <text x="450" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Прабабушка Джейн — каркас дерева и путь наследования. Приглашать не нужно.</text>

  <!-- Central spine line -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M450,130 L450,200"/>
    <path d="M450,265 L450,335"/>
  </g>

  <!-- Deceased ancestor Jane -->
  <g transform="translate(360, 65)" filter="url(#shadow)">
    <rect width="180" height="75" rx="16" fill="url(#grad-deceased)" stroke="#6b7280" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="32" cy="27" r="12" fill="none" stroke="white" stroke-width="2"/>
    <text x="58" y="31" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Джейн</text>
    <text x="58" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#f1f5f9">♀ прабабушка, умерла</text>
    <text x="165" y="25" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="white">✝</text>
  </g>

  <!-- Grandmother -->
  <g transform="translate(375, 200)" filter="url(#shadow)">
    <rect width="150" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Бабушка</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Mother -->
  <g transform="translate(385, 335)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Мать</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Alison -->
  <g transform="translate(385, 430)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-alison)"/>
    <circle cx="28" cy="22" r="10" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Алисон</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Annotation: structural node -->
  <g transform="translate(600, 85)">
    <path d="M0,15 L60,15" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-deceased)"/>
    <defs>
      <marker id="arrow-deceased" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
      </marker>
    </defs>
    <text x="70" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569">Структурный узел</text>
    <text x="70" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">сохраняет путь наследования</text>
  </g>

  <!-- Annotation: no invitation -->
  <g transform="translate(600, 160)">
    <path d="M0,15 L60,15" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-no-invite)"/>
    <defs>
      <marker id="arrow-no-invite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
      </marker>
    </defs>
    <text x="70" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569">Без приглашения</text>
    <text x="70" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">умерших не приглашают</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 485)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#grad-deceased)" stroke="#6b7280" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="28" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">структурный узел умершего</text>
    <rect x="230" y="0" width="18" height="18" rx="4" fill="#22c55e"/>
    <text x="258" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">живой родственник</text>
  </g>
</svg>