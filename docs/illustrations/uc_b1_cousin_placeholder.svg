<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="grad-alison" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="grad-living" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="grad-placeholder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="grad-new" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>

  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">B1. Приглашение кузины не принято</text>
  <text x="450" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Кузина остаётся placeholder. Алисон продолжает строить дерево сама.</text>

  <!-- Connecting lines -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M450,160 L450,240"/>
    <path d="M450,300 L450,380"/>
    <path d="M300,380 L380,380"/>
    <path d="M520,380 L600,380"/>
    <path d="M600,380 L600,300 L700,300"/>
    <path d="M600,380 L600,460 L700,460"/>
  </g>

  <!-- Grandmother -->
  <g transform="translate(375, 95)" filter="url(#shadow)">
    <rect width="150" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Бабушка</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Mother -->
  <g transform="translate(385, 240)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Мать</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Alison -->
  <g transform="translate(385, 415)" filter="url(#shadow)">
    <rect width="130" height="70" rx="16" fill="url(#grad-alison)"/>
    <circle cx="30" cy="24" r="11" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
    <text x="54" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Алисон</text>
    <text x="54" y="49" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ строит дерево</text>
  </g>

  <!-- Brother -->
  <g transform="translate(170, 450)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <rect x="18" y="12" width="20" height="20" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <text x="48" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Брат</text>
    <text x="48" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♂ жив</text>
  </g>

  <!-- Cousin - placeholder -->
  <g transform="translate(700, 270)" filter="url(#shadow)">
    <rect width="150" height="75" rx="16" fill="url(#grad-placeholder)" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="30" cy="26" r="11" fill="none" stroke="#64748b" stroke-width="2"/>
    <text x="54" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#475569">Кузина</text>
    <text x="54" y="51" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">♀ приглашение</text>
    <text x="54" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">не принято</text>
  </g>

  <!-- New relative Alison added -->
  <g transform="translate(700, 430)" filter="url(#shadow)">
    <rect width="150" height="65" rx="14" fill="url(#grad-new)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Дядя</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♂ добавлен</text>
  </g>

  <!-- Annotation -->
  <g transform="translate(600, 300)">
    <path d="M0,15 L50,15" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow-placeholder)"/>
    <defs>
      <marker id="arrow-placeholder" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
      </marker>
    </defs>
    <text x="60" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569">Placeholder</text>
    <text x="60" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">Алисон владеет узлом</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 525)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="url(#grad-placeholder)" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="28" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">приглашённый, но не вошёл</text>
    <rect x="230" y="0" width="18" height="18" rx="4" fill="url(#grad-new)"/>
    <text x="258" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">новый узел от Алисон</text>
  </g>
</svg>