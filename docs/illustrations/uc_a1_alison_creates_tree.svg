<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="grad-alison" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="grad-living" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="grad-male" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="grad-deceased" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>

  <text x="450" y="45" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">A1. Алисон создаёт приватное дерево</text>
  <text x="450" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Только имя, пол, связь, жив/умер. Никакой медицинской информации.</text>

  <!-- Connecting lines -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M450,165 L450,230"/>
    <path d="M450,290 L450,355"/>
    <path d="M320,260 L390,260"/>
    <path d="M510,260 L580,260"/>
    <path d="M450,355 L300,355 L300,410"/>
    <path d="M450,355 L600,355 L600,410"/>
    <path d="M300,355 L300,300 L220,300"/>
    <path d="M600,355 L600,300 L680,300"/>
  </g>

  <!-- Great-grandmother -->
  <g transform="translate(375, 100)" filter="url(#shadow)">
    <rect width="150" height="65" rx="14" fill="url(#grad-deceased)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Прабабушка</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ умерла</text>
  </g>

  <!-- Grandmother -->
  <g transform="translate(375, 250)" filter="url(#shadow)">
    <rect width="150" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Бабушка</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Mother -->
  <g transform="translate(160, 250)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Мать</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Brother -->
  <g transform="translate(110, 410)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-male)"/>
    <rect x="18" y="12" width="20" height="20" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <text x="48" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Брат</text>
    <text x="48" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♂ жив</text>
  </g>

  <!-- Alison -->
  <g transform="translate(385, 380)" filter="url(#shadow)">
    <rect width="130" height="70" rx="16" fill="url(#grad-alison)"/>
    <circle cx="30" cy="24" r="11" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
    <text x="54" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="white">Алисон</text>
    <text x="54" y="49" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива, владелица</text>
  </g>

  <!-- Cousin -->
  <g transform="translate(660, 410)" filter="url(#shadow)">
    <rect width="130" height="65" rx="14" fill="url(#grad-living)"/>
    <circle cx="28" cy="22" r="10" fill="none" stroke="white" stroke-width="2"/>
    <text x="50" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="white">Кузина</text>
    <text x="50" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f1f5f9">♀ жива</text>
  </g>

  <!-- Private badge -->
  <g transform="translate(720, 110)">
    <rect width="130" height="34" rx="17" fill="#1e293b"/>
    <text x="38" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="white">🔒 Приватно</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 470)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#6366f1" stroke-width="2"/>
    <text x="28" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">женский пол</text>
    <rect x="130" y="2" width="16" height="16" rx="4" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="155" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">мужской пол</text>
    <rect x="260" y="2" width="16" height="16" rx="4" fill="#9ca3af"/>
    <text x="285" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">умерший</text>
    <rect x="370" y="2" width="16" height="16" rx="4" fill="#22c55e"/>
    <text x="395" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">живой</text>
  </g>
</svg>